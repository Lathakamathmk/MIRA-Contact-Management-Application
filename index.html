<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRA — Contact Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables (Theme) ─── */
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --accent:   #2ea8a0;
      --accent2:  #1a7f79;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --danger:   #f85149;
      --success:  #3fb950;
      --warning:  #d29922;
      --radius:   10px;
      --font:     'DM Sans', sans-serif;
      --mono:     'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .brand-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }

    .header-meta {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* ─── Layout ─── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .page-sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ─── Top Bar: search + add button ─── */
    .topbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      width: 100%;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
    }

    #searchInput {
      padding-left: 38px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent2); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover { background: rgba(248,81,73,0.1); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── Stats Bar ─── */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .stat-pill span {
      color: var(--accent);
      font-weight: 700;
    }

    /* ─── Contact Grid ─── */
    #contactGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ─── Contact Card ─── */
    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .contact-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 16px;
      font-weight: 600;
    }

    .card-id {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .card-body {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .card-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .card-row svg { flex-shrink: 0; margin-top: 2px; color: var(--accent); }
    .card-row span { color: var(--text); word-break: break-all; }

    .card-actions {
      display: flex;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .card-actions .btn { flex: 1; justify-content: center; font-size: 13px; padding: 8px 12px; }

    /* ─── Empty State ─── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state svg { opacity: 0.3; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p  { font-size: 14px; }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      padding: 16px;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 480px;
      padding: 28px;
      transform: scale(0.96);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal {
      transform: scale(1);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-title svg { color: var(--accent); }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-error {
      font-size: 11px;
      color: var(--danger);
      margin-top: 2px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 14px;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 320px;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--danger);  color: var(--danger);  }

    /* ─── Confirm Modal ─── */
    #confirmModal .modal {
      max-width: 360px;
      text-align: center;
    }

    #confirmModal .modal p {
      color: var(--muted);
      font-size: 14px;
      margin: 10px 0 24px;
    }

    /* ─── Loading ─── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .topbar { flex-wrap: wrap; }
      header { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- ───────────── HEADER ───────────── -->
<header>
  <div class="brand">
    <div class="brand-dot"></div>
    MIRA
    <span style="font-weight:300; color: var(--muted);">/ Contact Manager</span>
  </div>
  <div class="header-meta">Medical Intelligence Robotic Automation</div>
</header>

<!-- ───────────── MAIN ───────────── -->
<div class="container">
  <h1 class="page-title">Contacts</h1>
  <p class="page-sub">Manage patient and staff contact records for MIRA workflows.</p>

  <!-- Search + Add -->
  <div class="topbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name or email…" oninput="handleSearch()" />
    </div>
    <button class="btn btn-primary" onclick="openCreateModal()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Contact
    </button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-pill">Total: <span id="totalCount">0</span></div>
    <div class="stat-pill" id="searchPill" style="display:none;">Results: <span id="searchCount">0</span></div>
  </div>

  <!-- Contact Grid -->
  <div id="contactGrid">
    <div class="empty-state">
      <div class="spinner"></div>
      <p style="margin-top:12px; font-size:13px; color:var(--muted)">Loading contacts…</p>
    </div>
  </div>
</div>


<!-- ───────────── CREATE / EDIT MODAL ───────────── -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-title">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span id="modalTitle">Add New Contact</span>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label for="firstName">First Name *</label>
        <input type="text" id="firstName" placeholder="e.g. Latha" />
        <div class="field-error" id="err_firstName"></div>
      </div>
      <div class="form-group">
        <label for="lastName">Last Name *</label>
        <input type="text" id="lastName" placeholder="e.g. Kamath" />
        <div class="field-error" id="err_lastName"></div>
      </div>
      <div class="form-group full">
        <label for="address">Address *</label>
        <input type="text" id="address" placeholder="e.g. 123, MG Road, Bengaluru - 560001" />
        <div class="field-error" id="err_address"></div>
      </div>
      <div class="form-group full">
        <label for="email">Email ID *</label>
        <input type="email" id="email" placeholder="e.g. latha@example.com" />
        <div class="field-error" id="err_email"></div>
      </div>
      <div class="form-group full">
        <label for="phone">Phone Number *</label>
        <input type="tel" id="phone" placeholder="e.g. 9876543210" maxlength="13" />
        <div class="field-error" id="err_phone"></div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitForm()" id="submitBtn">Save Contact</button>
    </div>
  </div>
</div>


<!-- ───────────── DELETE CONFIRM MODAL ───────────── -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title" style="justify-content:center;">
      <svg width="24" height="24" fill="none" stroke="var(--danger)" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
      Delete Contact
    </div>
    <p>Are you sure you want to permanently delete <strong id="deleteContactName"></strong>?<br/>This action cannot be undone.</p>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn btn-ghost" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Yes, Delete</button>
    </div>
  </div>
</div>


<!-- ───────────── TOAST ───────────── -->
<div id="toast"></div>


<!-- ───────────── JAVASCRIPT ───────────── -->
<script>
  /* ── State ── */
  let editingId   = null;  // null = create mode, number = edit mode
  let deleteId    = null;  // ID of contact pending deletion
  let allContacts = [];    // cached contact list
  let searchTimer = null;  // debounce timer for search

  const API = '/api/contacts';  // Base URL for all API calls

 
  async function loadContacts(search = '') {
    try {
      const url      = search ? `${API}?search=${encodeURIComponent(search)}` : API;
      const response = await fetch(url);          // GET request to Flask backend
      const data     = await response.json();     // Parse JSON response

      if (data.success) {
        allContacts = data.contacts;
        renderContacts(allContacts, search);

        // Update stats
        document.getElementById('totalCount').textContent = allContacts.length;
        if (search) {
          document.getElementById('searchPill').style.display = '';
          document.getElementById('searchCount').textContent  = allContacts.length;
        } else {
          document.getElementById('searchPill').style.display = 'none';
        }
      }
    } catch (err) {
      showToast('Failed to load contacts. Is the server running?', 'error');
    }
  }


  function renderContacts(contacts, search) {
    const grid = document.getElementById('contactGrid');

    if (contacts.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
          <h3>${search ? 'No contacts found' : 'No contacts yet'}</h3>
          <p>${search ? `No results for "${search}"` : 'Click "Add Contact" to get started.'}</p>
        </div>`;
      return;
    }

    // Build HTML for each contact card
    grid.innerHTML = contacts.map(c => `
      <div class="contact-card" id="card-${c.id}">
        <div class="card-header">
          <div class="avatar">${c.first_name[0]}${c.last_name[0]}</div>
          <div>
            <div class="card-name">${c.first_name} ${c.last_name}</div>
            <div class="card-id">ID #${String(c.id).padStart(4, '0')}</div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-row">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <span>${c.email}</span>
          </div>
          <div class="card-row">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.28h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <span>${c.phone}</span>
          </div>
          <div class="card-row">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span>${c.address}</span>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn btn-ghost" onclick="openEditModal(${c.id})">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Edit
          </button>
          <button class="btn btn-danger" onclick="openDeleteModal(${c.id}, '${c.first_name} ${c.last_name}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
            Delete
          </button>
        </div>
      </div>
    `).join('');
  }

  
  function handleSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const q = document.getElementById('searchInput').value.trim();
      loadContacts(q);
    }, 300);
  }

 
  function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Add New Contact';
    document.getElementById('submitBtn').textContent  = 'Save Contact';
    clearForm();
    openModal('formModal');
  }

  function openEditModal(id) {
    // Find the contact in our cached list
    const c = allContacts.find(x => x.id === id);
    if (!c) return;

    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Contact';
    document.getElementById('submitBtn').textContent  = 'Update Contact';

    // Pre-fill form fields with existing data
    document.getElementById('firstName').value = c.first_name;
    document.getElementById('lastName').value  = c.last_name;
    document.getElementById('address').value   = c.address;
    document.getElementById('email').value     = c.email;
    document.getElementById('phone').value     = c.phone;

    clearErrors();
    openModal('formModal');
  }

  function openDeleteModal(id, name) {
    deleteId = id;
    document.getElementById('deleteContactName').textContent = name;
    openModal('confirmModal');
  }

  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  
  async function submitForm() {
    clearErrors();

    // Collect form values
    const payload = {
      first_name: document.getElementById('firstName').value.trim(),
      last_name:  document.getElementById('lastName').value.trim(),
      address:    document.getElementById('address').value.trim(),
      email:      document.getElementById('email').value.trim(),
      phone:      document.getElementById('phone').value.trim()
    };

    // Decide: POST (create) or PUT (update)
    const method = editingId ? 'PUT' : 'POST';
    const url    = editingId ? `${API}/${editingId}` : API;

    try {
      const res  = await fetch(url, {
        method:  method,
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)   // Send data as JSON
      });
      const data = await res.json();

      if (data.success) {
        closeModal('formModal');
        showToast(editingId ? '✓ Contact updated.' : '✓ Contact added.', 'success');
        loadContacts();  // Refresh the list
      } else {
        // Show field-level errors returned by Flask
        (data.errors || []).forEach(err => {
          if (err.toLowerCase().includes('first'))  showFieldError('firstName', err);
          else if (err.toLowerCase().includes('last'))    showFieldError('lastName', err);
          else if (err.toLowerCase().includes('address')) showFieldError('address', err);
          else if (err.toLowerCase().includes('email'))   showFieldError('email', err);
          else if (err.toLowerCase().includes('phone'))   showFieldError('phone', err);
          else showToast(err, 'error');
        });
      }
    } catch (err) {
      showToast('Network error. Please try again.', 'error');
    }
  }

 
  async function confirmDelete() {
    if (!deleteId) return;
    try {
      const res  = await fetch(`${API}/${deleteId}`, { method: 'DELETE' });
      const data = await res.json();

      if (data.success) {
        closeModal('confirmModal');
        showToast('✓ Contact deleted.', 'success');
        loadContacts();
      } else {
        showToast('Delete failed.', 'error');
      }
    } catch (err) {
      showToast('Network error.', 'error');
    }
    deleteId = null;
  }

  
  function clearForm() {
    ['firstName','lastName','address','email','phone'].forEach(id => {
      document.getElementById(id).value = '';
    });
    clearErrors();
  }

  function clearErrors() {
    ['firstName','lastName','address','email','phone'].forEach(f => {
      document.getElementById(`err_${f}`).textContent = '';
    });
  }

  function showFieldError(fieldId, message) {
    const el = document.getElementById(`err_${fieldId}`);
    if (el) el.textContent = message;
  }

  let toastTimer = null;
  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.className = ''; }, 3000);
  }

  // Close modals when clicking outside
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });

  // Close modal on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
    }
  });


  loadContacts();
</script>
</body>
</html>
